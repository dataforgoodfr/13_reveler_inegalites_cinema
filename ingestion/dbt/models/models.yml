version: 2

models:
  - name: stg_allocine_data
    config:
      tags: ["phase2"]
    description: Typed staging projection of raw Allocine scraping output loaded through the custom Airbyte source.
    columns:
      - name: source_record_id
        tests:
          - not_null
      - name: extracted_ts
        tests:
          - not_null

  - name: int_films_latest_by_visa
    config:
      tags: ["phase1"]
    description: Latest film record per CNC visa number, based on Airbyte extraction metadata.
    columns:
      - name: cnc_visa
        tests:
          - not_null
          - unique

  - name: int_allocine_data_latest_by_source_record
    config:
      tags: ["phase2"]
    description: Latest Allocine scraping result per source record, based on extraction timestamp.
    columns:
      - name: source_record_id
        tests:
          - not_null
          - unique

  - name: stg_mubi_festival_films
    config:
      tags: [mubi]
    description: Staging des films en selection dans les festivals Mubi (scrape_status=success uniquement).
    columns:
      - name: film_link
        tests:
          - not_null
      - name: extracted_at
        tests:
          - not_null

  - name: stg_mubi_film_awards
    config:
      tags: [mubi]
    description: Staging des palmares Mubi par film, incluant le mubi_id extrait du HTML (Next.js __NEXT_DATA__).
    columns:
      - name: film_link
        tests:
          - not_null
      - name: extracted_at
        tests:
          - not_null

  - name: int_mubi_festival_films
    config:
      tags: [mubi]
    description: Films en selection festival Mubi, enrichis du cnc_visa et allocine_id via jointure sur mubi_id.

  - name: int_mubi_film_awards
    config:
      tags: [mubi]
    description: Palmares Mubi par film, enrichis du cnc_visa et allocine_id via jointure sur mubi_id.
