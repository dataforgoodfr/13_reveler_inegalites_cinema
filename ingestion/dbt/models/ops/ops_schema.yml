version: 2

models:
  - name: v_allocine_pipeline_status
    config:
      tags: ["phase2"]
    description: >
      Vue de monitoring des tentatives de scraping Allocine,
      exposée dans le schéma `ops` pour Metabase.
    columns:
      - name: extracted_date
        description: Date UTC de l'extraction.
        tests:
          - not_null
      - name: extracted_hour
        description: Heure UTC de l'extraction, de 0 a 23.
        tests:
          - not_null
      - name: extracted_ts
        description: Horodatage brut de l'extraction.
        tests:
          - not_null
      - name: run_id
        description: Identifiant du run de scraping.
      - name: cnc_visa
        description: Visa CNC du film.
      - name: source_record_id
        description: Identifiant de la ligne source du scraping.
        tests:
          - not_null
      - name: scrapping_status
        description: Statut du scraping pour cette tentative.
      - name: match_strategy
        description: Strategie de matching utilisee.
      - name: record_hash
        description: Hash technique de la tentative.
      - name: error_message
        description: Message d'erreur remonte par le scraper en cas d'echec.
