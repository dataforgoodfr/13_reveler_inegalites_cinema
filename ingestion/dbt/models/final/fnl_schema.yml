version: 2

models:
  - name: fnl_films
    description: >
      Table finale des films constituant la table centrale de Cinéstats 50/50. 
      Consolide les données CNC, Allociné et le financement français pour permettre 
      l'analyse des inégalités de genre dans le cinéma français.
    columns:
      - name: movie_id
        description: "Identifiant unique du film dans Cinéstats 50/50."
        tests:
          - not_null
          - unique
      - name: allocine_id
        description: "Identifiant du film sur Allociné."
      - name: mubi_id
        description: "Identifiant du film sur Mubi."
      - name: tmdb_id
        description: "Identifiant du film sur TMDB."
      - name: cnc_visa
        description: "Visa d'exploitation CNC du film."
        tests:
          - not_null
          - unique
      - name: movie_name
        description: "Titre du film tel qu'affiché dans Cinéstats 50/50, privilégiant le titre Allociné."
        tests:
          - not_null
      - name: cnc_agreement_year
        description: "Année d'agrément CNC du film, utilisée comme référence temporelle pour les analyses."
      - name: release_date
        description: "Date de sortie en salle du film."
      - name: duration_mn
        description: "Durée du film en minutes."
      - name: budget
        description: "Budget du film en euros."
      - name: budget_category
        description: "Tranche de budget du film (ex: petit, moyen, grand budget)."
      - name: genre_category
        description: "Genre cinématographique du film."
      - name: broadcasters
        description: "Diffuseurs TV associés au film (chaînes payantes et gratuites)."
      - name: is_french_financed
        description: "Vrai si la France finance au moins 50% du budget du film."
      - name: has_parity_bonus
        description: "Vrai si le film a bénéficié du bonus parité CNC, récompensant les productions respectant l'égalité femmes-hommes."
      - name: has_eof
        description: "Vrai si le film bénéficie du soutien EOF (Europa Organisation des Films)."
      - name: has_sofica_funding
        description: "Vrai si le film a été financé par une SOFICA (Société de Financement du Cinéma et de l'Audiovisuel)."
      - name: has_tax_credit
        description: "Vrai si le film bénéficie d'un crédit d'impôt cinéma."
      - name: has_regional_funding
        description: "Vrai si le film a reçu une aide financière d'une collectivité régionale."
      - name: filmography_rank
        description: "Position du film dans la carrière du ou des réalisateur(s), indicateur d'expérience pertinent pour l'analyse des inégalités d'accès à la réalisation."
      - name: has_asr
        description: "Vrai si le film bénéficie de l'aide sélective à la réalisation (ASR) du CNC."

  - name: fnl_film_country_budget_allocation
    description: >
      Table finale de la répartition du financement des films par pays de coproduction. 
      Permet d'analyser la dimension internationale des productions.
    columns:
      - name: id
        description: "Identifiant unique de la ligne (couple film × pays)."
        tests:
          - not_null
          - unique
      - name: movie_id
        description: "Identifiant du film associé."
        tests:
          - not_null
      - name: cnc_visa
        description: "Visa d'exploitation CNC du film."
        tests:
          - not_null
      - name: country_id
        description: "Identifiant du pays de coproduction."
        tests:
          - not_null
      - name: country_name
        description: "Nom du pays de coproduction."
        tests:
          - not_null
      - name: budget_allocation
        description: "Part du financement apportée par ce pays, exprimée en pourcentage du budget total du film."